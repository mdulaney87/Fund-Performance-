<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Performance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #12151a;
    --surface2: #1c2028;
    --border: #252930;
    --text: #e8eaed;
    --muted: #6b7280;
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.12);
    --red: #ff5b5b;
    --red-dim: rgba(255,91,91,0.12);
    --green: #00d4aa;
    --green-dim: rgba(0,212,170,0.12);
    --yellow: #f5c842;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .last-updated {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .refresh-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .refresh-btn:active { opacity: 0.7; transform: scale(0.97); }
  .refresh-btn.spinning { opacity: 0.5; pointer-events: none; }

  .col-labels {
    display: grid;
    grid-template-columns: 1fr 80px 80px 32px;
    gap: 6px;
    padding: 8px 20px 0;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .col-labels .right { text-align: right; }

  main { padding: 8px 0 100px; }

  .ticker-card {
    display: grid;
    grid-template-columns: 1fr 80px 80px 32px;
    gap: 6px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
    transition: background 0.15s;
  }

  .ticker-card:active { background: var(--surface); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ticker-info { min-width: 0; }

  .ticker-symbol {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.3px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ticker-name {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ticker-price {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .perf-cell {
    text-align: right;
  }

  .perf-value {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }

  .perf-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-top: 1px;
  }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--muted); }

  .pill {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }

  .pill.pos { background: var(--green-dim); }
  .pill.neg { background: var(--red-dim); }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    border-radius: 4px;
    transition: color 0.2s;
  }
  .delete-btn:active { color: var(--red); }

  .loading-cell {
    color: var(--muted);
    font-size: 11px;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .error-cell {
    color: var(--red);
    font-size: 10px;
  }

  /* Add bar */
  .add-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .add-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: border-color 0.2s;
  }

  .add-input::placeholder { color: var(--muted); font-weight: 400; letter-spacing: 0.5px; font-size: 13px; text-transform: none; }
  .add-input:focus { border-color: var(--accent); }

  .add-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .add-btn:active { opacity: 0.8; transform: scale(0.97); }
  .add-btn:disabled { opacity: 0.4; }

  .empty-state {
    text-align: center;
    padding: 60px 40px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 16px; }
  .empty-state p { font-size: 13px; line-height: 1.7; }

  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 8px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error { border-color: var(--red); color: var(--red); }

  .section-divider {
    padding: 6px 20px;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  /* Quarter info badge */
  .quarter-badge {
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>PERF<span>.</span>TRACK</h1>
      <div class="last-updated" id="lastUpdated">—</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="quarter-badge" id="quarterBadge">Q? 2026</span>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">↻ REFRESH</button>
    </div>
  </div>
</header>

<div class="col-labels">
  <div>TICKER</div>
  <div class="right">QTD</div>
  <div class="right">YTD</div>
  <div></div>
</div>

<main id="tickerList"></main>

<div class="add-bar">
  <input class="add-input" id="tickerInput" type="text" placeholder="Add ticker (e.g. AAPL, VOO)" maxlength="10" autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="add-btn" id="addBtn" onclick="addTicker()">+ ADD</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────
const STORAGE_KEY = 'perftrack_tickers_v2';
let tickers = [];
let perfData = {};

function getCurrentQuarter() {
  const now = new Date();
  const m = now.getMonth();
  const q = Math.floor(m / 3) + 1;
  const qStart = new Date(now.getFullYear(), Math.floor(m/3)*3, 1);
  return { q, year: now.getFullYear(), start: qStart };
}

function getQuarterLabel() {
  const { q, year } = getCurrentQuarter();
  return `Q${q} ${year}`;
}

// ── Storage ────────────────────────────────────────────────────
function loadTickers() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        tickers = JSON.parse(saved);
    } else {
        // Safe default starter pack
        tickers = ["GOOG", "AMZN", "BA", "AXP", "SPY"];
        saveTickers();
    }
  } catch(e) { tickers = ["GOOG", "AMZN", "BA", "AXP", "SPY"]; }
}

function saveTickers() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tickers));
}

// ── Fixed Financial Data Engine ────────────────────────────────
function getTimestamps() {
    const now = new Date();
    const currentYear = now.getFullYear();
    
    // Set baseline target windows to guarantee tracking data points capture historical close
    const ytdStartDate = new Date(currentYear - 1, 11, 28);
    const ytdPeriodStart = Math.floor(ytdStartDate.getTime() / 1000);

    let qtdStartDate;
    const currentMonth = now.getMonth();
    
    if (currentMonth >= 0 && currentMonth <= 2) {
        qtdStartDate = new Date(currentYear - 1, 11, 28);
    } else if (currentMonth >= 3 && currentMonth <= 5) {
        qtdStartDate = new Date(currentYear, 2, 28);
    } else if (currentMonth >= 6 && currentMonth <= 8) {
        qtdStartDate = new Date(currentYear, 5, 28);
    } else {
        qtdStartDate = new Date(currentYear, 8, 28);
    }
    const qtdPeriodStart = Math.floor(qtdStartDate.getTime() / 1000);

    const period1 = Math.min(ytdPeriodStart, qtdPeriodStart);
    const period2 = Math.floor(now.getTime() / 1000);

    return { period1, period2, ytdPeriodStart, qtdPeriodStart };
}

async function fetchPerformance(symbol) {
  try {
    const { period1, period2, ytdPeriodStart, qtdPeriodStart } = getTimestamps();
    
    // Direct cross-origin request handled seamlessly via a routing bridge
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${period1}&period2=${period2}&interval=1d&includeAdjustedClose=true`;
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
    
    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error('Network error');
    
    const data = await response.json();
    const result = data.chart.result[0];
    
    if (!result) return { found: false, symbol };

    const timestamps = result.timestamp;
    const quotes = result.indicators.adjclose[0].adjclose;
    const currentPrice = result.meta.regularMarketPrice;
    
    let ytdIdx = 0;
    let qtdIdx = 0;

    for(let i = 0; i < timestamps.length; i++) {
        if (timestamps[i] <= ytdPeriodStart) ytdIdx = i;
        if (timestamps[i] <= qtdPeriodStart) qtdIdx = i;
    }

    const ytdBasePrice = quotes[ytdIdx] || quotes[0];
    const qtdBasePrice = quotes[qtdIdx] || quotes[0];

    const ytdPerf = ((currentPrice - ytdBasePrice) / ytdBasePrice) * 100;
    const qtdPerf = ((currentPrice - qtdBasePrice) / qtdBasePrice) * 100;

    return {
      found: true,
      symbol,
      name: symbol + " Asset Component",
      price: currentPrice,
      qtd_pct: qtdPerf,
      ytd_pct: ytdPerf
    };

  } catch(e) {
    console.error('Fetch error for', symbol, e);
    return { found: false, symbol, error: e.message };
  }
}

// ── Render ─────────────────────────────────────────────────────
function formatPct(val) {
  if (val === null || val === undefined) return '—';
  const sign = val >= 0 ? '+' : '';
  return `${sign}${val.toFixed(2)}%`;
}

function pctClass(val) {
  if (val === null || val === undefined) return 'neu';
  return val >= 0 ? 'pos' : 'neg';
}

function renderList() {
  const list = document.getElementById('tickerList');

  if (tickers.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">📈</div>
        <p>No tickers added yet.<br>Type a symbol below and tap ADD.</p>
      </div>`;
    return;
  }

  list.innerHTML = tickers.map((sym, i) => {
    const d = perfData[sym];
    let qtdHtml, ytdHtml, nameHtml, priceHtml;

    if (!d) {
      qtdHtml = `<div class="loading-cell">···</div>`;
      ytdHtml = `<div class="loading-cell">···</div>`;
      nameHtml = `<div class="ticker-name loading-cell">fetching…</div>`;
      priceHtml = '';
    } else if (d.found === false) {
      qtdHtml = `<div class="error-cell">ERR</div>`;
      ytdHtml = `<div class="error-cell">ERR</div>`;
      nameHtml = `<div class="ticker-name" style="color:var(--red)">not found</div>`;
      priceHtml = '';
    } else {
      const qtdCls = pctClass(d.qtd_pct);
      const ytdCls = pctClass(d.ytd_pct);
      qtdHtml = `
        <div class="perf-cell">
          <div class="perf-value ${qtdCls}">${formatPct(d.qtd_pct)}</div>
        </div>`;
      ytdHtml = `
        <div class="perf-cell">
          <div class="perf-value ${ytdCls}">${formatPct(d.ytd_pct)}</div>
        </div>`;
      nameHtml = `<div class="ticker-name">${d.name || ''}</div>`;
      priceHtml = d.price ? `<div class="ticker-price">$${Number(d.price).toFixed(2)}</div>` : '';
    }

    return `
      <div class="ticker-card" id="card-${sym}">
        <div class="ticker-info">
          <div class="ticker-symbol">${sym}</div>
          ${nameHtml}
          ${priceHtml}
        </div>
        ${qtdHtml}
        ${ytdHtml}
        <button class="delete-btn" onclick="removeTicker('${sym}')" title="Remove">×</button>
      </div>`;
  }).join('');
}

// ── Add / Remove ───────────────────────────────────────────────
async function addTicker() {
  const input = document.getElementById('tickerInput');
  const sym = input.value.trim().toUpperCase().replace(/[^A-Z0-9.\-^]/g, '');
  if (!sym) return;

  if (tickers.includes(sym)) {
    showToast(`${sym} already in list`, true);
    input.value = '';
    return;
  }

  tickers.push(sym);
  saveTickers();
  input.value = '';
  renderList();

  const data = await fetchPerformance(sym);
  perfData[sym] = data;
  renderList();

  if (data.found === false) {
    showToast(`Could not find data for ${sym}`, true);
  } else {
    showToast(`${sym} added`);
  }
}

function removeTicker(sym) {
  tickers = tickers.filter(t => t !== sym);
  delete perfData[sym];
  saveTickers();
  renderList();
}

// ── Refresh all ────────────────────────────────────────────────
async function refreshAll() {
  if (tickers.length === 0) return;
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.textContent = '↻ …';

  perfData = {};
  renderList();

  const results = await Promise.all(tickers.map(sym => fetchPerformance(sym)));
  results.forEach((d, i) => { perfData[tickers[i]] = d; });

  renderList();
  updateTimestamp();
  btn.classList.remove('spinning');
  btn.textContent = '↻ REFRESH';
  showToast('Updated');
}

// ── Utils ──────────────────────────────────────────────────────
function updateTimestamp() {
  const el = document.getElementById('lastUpdated');
  const now = new Date();
  el.textContent = `Updated ${now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
}

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

document.getElementById('tickerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTicker();
});

// ── Init ───────────────────────────────────────────────────────
async function init() {
  document.getElementById('quarterBadge').textContent = getQuarterLabel();
  loadTickers();
  renderList();

  if (tickers.length > 0) {
    const results = await Promise.all(tickers.map(sym => fetchPerformance(sym)));
    results.forEach((d, i) => { perfData[tickers[i]] = d; });
    renderList();
    updateTimestamp();
  }
}

init();
</script>
</body>
</html>
